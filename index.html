<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>림버스 인격 두들</title>
  <link rel="icon" type="image/png" href="./Thumbnail.png" />
  <style>
    :root {
      --bg: #141414; --panel: #1f1f1f; --panel2: #292929; --text: #f4f1ea;
      --muted: #b8b0a3; --border: #403a33; --green: #3f8f57; --red: #8b3a36;
      --yellow: #b48a30; --button: #c9a86a; --buttonText: #1b1712;
    }
    * { box-sizing: border-box; }
    body { margin:0; font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: radial-gradient(circle at top, #2a241e 0%, var(--bg) 42%, #0f0f0f 100%); color: var(--text); min-height:100vh; padding:24px; }
    .wrap { max-width:1180px; margin:0 auto; }
    header { margin-bottom:18px; position:relative; padding-right:220px; }
    .top-actions { position:absolute; right:0; top:0; display:flex; align-items:center; gap:10px; }
    .version-badge { display:inline-flex; align-items:center; justify-content:center; min-height:34px; padding:0 10px; border-radius:999px; border:1px solid var(--border); background:rgba(0,0,0,.22); color:var(--muted); font-size:14px; font-weight:800; white-space:nowrap; }
    .contact-btn { display:inline-flex; align-items:center; justify-content:center; min-height:38px; padding:0 14px; border-radius:999px; border:1px solid color-mix(in srgb, var(--button) 70%, transparent); background: color-mix(in srgb, var(--button) 92%, #fff 8%); color:var(--buttonText); font-weight:800; text-decoration:none; box-shadow:0 10px 24px rgba(0,0,0,.22); }
    .contact-btn:hover { filter:brightness(1.06); transform:translateY(-1px); }
    .contact-btn:active { transform:translateY(0); }
    .sub { color:var(--muted); line-height:1.55; }
    .challenge-info { margin-top:6px; font-size:14px; color:var(--muted); display:none; }
    .challenge-no { font-weight:800; color:#ffd98a; }
    .countdown { font-size:13px; color:var(--muted); margin-left:10px; }
    .tab-bar { display:flex; gap:8px; margin-bottom:16px; }
    .tab { height:42px; padding:0 20px; border-radius:12px; border:1px solid var(--border); background:var(--panel2); color:var(--muted); font:inherit; font-size:15px; font-weight:700; cursor:pointer; transition:background .15s,color .15s,border-color .15s; }
    .tab.active { background:var(--button); color:var(--buttonText); border-color:var(--button); }
    .panel { background: color-mix(in srgb, var(--panel) 88%, transparent); border:1px solid var(--border); border-radius:18px; padding:18px; margin-bottom:16px; box-shadow:0 14px 36px rgba(0,0,0,.28); }
    .already-played { display:none; padding:12px 16px; border-radius:12px; background:color-mix(in srgb, var(--yellow) 15%, var(--panel2)); border:1px solid color-mix(in srgb, var(--yellow) 40%, transparent); color:#ffd98a; font-weight:700; margin-bottom:14px; }
    .filter-block { display:flex; flex-direction:column; gap:12px; margin-bottom:14px; }
    .filter-row { display:grid; grid-template-columns: 86px repeat(5, minmax(110px, 1fr)) auto; gap:10px; align-items:end; }
    .filter-title { height:44px; display:flex; align-items:center; justify-content:center; border:1px solid var(--border); border-radius:12px; background:var(--panel2); color:#ffd98a; font-weight:900; }
    .field label { display:block; color:var(--muted); font-size:14px; margin:0 0 6px; }
    input, button { height:44px; border-radius:12px; border:1px solid var(--border); font:inherit; }
    input { width:100%; background:#131313; color:var(--text); padding:0 12px; }
    input::placeholder { color:#7e766c; }
    button { border:0; padding:0 18px; background:var(--button); color:var(--buttonText); font-weight:800; cursor:pointer; white-space:nowrap; }
    button.secondary { background:var(--panel2); color:var(--text); border:1px solid var(--border); }
    button:disabled { opacity:.55; cursor:not-allowed; }
    .mode-box { display:flex; gap:8px; flex-wrap:wrap; align-items:center; min-width:150px; }
    .mode-box label { display:flex; gap:6px; align-items:center; height:36px; padding:0 14px; border:1px solid var(--border); border-radius:999px; background:var(--panel2); cursor:pointer; color:var(--muted); transition:background .15s, color .15s, border-color .15s; }
    .mode-box label:has(input:checked) { background:var(--button); color:var(--buttonText); border-color:var(--button); font-weight:800; }
    .mode-box input { position:absolute; opacity:0; width:0; height:0; pointer-events:none; }
    .guess-row { display:grid; grid-template-columns: 1fr auto auto auto; gap:10px; align-items:start; }
    .combo { position:relative; }
    .dropdown { position:absolute; z-index:20; left:0; right:0; top:50px; max-height:300px; overflow:auto; background:#151515; border:1px solid var(--border); border-radius:14px; box-shadow:0 18px 30px rgba(0,0,0,.45); display:none; }
    .dropdown.open { display:block; }
    .option { display:flex; justify-content:space-between; gap:12px; padding:10px 12px; cursor:pointer; border-bottom:1px solid rgba(255,255,255,.05); }
    .option:hover, .option.active { background:var(--panel2); }
    .option-name { font-weight:750; }
    .option-meta { color:var(--muted); font-size:13px; white-space:nowrap; }
    .option.eliminated .option-name { text-decoration: line-through; opacity:.48; }
    .option.eliminated .option-meta { opacity:.45; }
    .status { display:flex; justify-content:space-between; gap:14px; flex-wrap:wrap; margin-top:14px; color:var(--muted); }
    .message { margin-top:12px; min-height:28px; line-height:1.55; }
    .legend { display:flex; gap:8px; flex-wrap:wrap; margin-top:12px; color:var(--muted); font-size:14px; }
    .pill { border-radius:999px; padding:4px 10px; border:1px solid var(--border); background:var(--panel2); }
    .pill.hit { background: color-mix(in srgb, var(--green) 70%, #111); color:white; }
    .pill.miss { background: color-mix(in srgb, var(--red) 65%, #111); color:white; }
    .answer { font-weight:900; color:#ffd98a; }
    .answer-img-wrap { margin-top:14px; text-align:center; }
    .answer-img-wrap img { max-height:260px; border-radius:10px; box-shadow:0 4px 24px #0008; }
    .table-wrap { overflow:auto; }
    .record-head { display:flex; justify-content:space-between; align-items:center; gap:12px; margin-bottom:10px; }
    .record-head h2 { margin:0; font-size:20px; }
    .record-note { color:var(--muted); font-size:14px; margin:4px 0 0; }
    .record-success { color:#bdf0c8; font-weight:900; }
    .record-fail { color:#ffb8b2; font-weight:900; }
    .small-btn { height:34px; padding:0 12px; font-size:14px; }
    table { width:100%; border-collapse:separate; border-spacing:0 8px; min-width:820px; }
    th { text-align:left; color:var(--muted); font-size:14px; font-weight:700; padding:0 10px 4px; white-space:nowrap; }
    td { padding:10px; background:var(--panel2); border-top:1px solid var(--border); border-bottom:1px solid var(--border); vertical-align:top; }
    td:first-child { border-left:1px solid var(--border); border-radius:12px 0 0 12px; color:var(--muted); width:42px; white-space:nowrap; }
    td:last-child { border-right:1px solid var(--border); border-radius:0 12px 12px 0; }
    .cell { display:flex; flex-direction:column; gap:4px; }
    .value { font-weight:800; }
    .judge { font-size:14px; opacity:.95; }
    .hit { background: color-mix(in srgb, var(--green) 70%, #111); }
    .miss { background: color-mix(in srgb, var(--red) 65%, #111); }
    .empty { opacity:.65; }
    .kw-chip { display:inline-block; border-radius:5px; padding:2px 10px; font-size:13px; font-weight:700; line-height:1.5; border:1px solid rgba(255,255,255,.12); }
    .sinner-dot { display:inline-block; width:8px; height:8px; border-radius:50%; margin-right:5px; vertical-align:middle; flex-shrink:0; }
    .grade-1 { color:#888; }
    .grade-2 { color:#c8aa60; }
    .grade-3 { color:#ffd060; text-shadow:0 0 10px rgba(255,200,60,.45); }
    h1 { margin:0 0 8px; font-size:clamp(28px,4vw,44px); letter-spacing:-.04em; background:linear-gradient(90deg,#e8c97a 0%,#c07858 30%,#9060c0 65%,#4090c8 100%); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; }
    @keyframes cell-reveal { 0%{opacity:0;transform:scaleY(.4)} 60%{transform:scaleY(1.06)} 100%{opacity:1;transform:scaleY(1)} }
    .reveal-row td { animation:cell-reveal .28s ease both; transform-origin:center; }
    .reveal-row td:nth-child(1){animation-delay:0ms} .reveal-row td:nth-child(2){animation-delay:80ms} .reveal-row td:nth-child(3){animation-delay:160ms} .reveal-row td:nth-child(4){animation-delay:240ms} .reveal-row td:nth-child(5){animation-delay:320ms} .reveal-row td:nth-child(6){animation-delay:400ms} .reveal-row td:nth-child(7){animation-delay:480ms} .reveal-row td:nth-child(8){animation-delay:560ms} .reveal-row td:nth-child(9){animation-delay:640ms}
    @media (prefers-reduced-motion:reduce) { .reveal-row td { animation:none; } }
    @media (max-width:800px) { body{padding:14px} .filter-row,.guess-row{grid-template-columns:1fr} .filter-title{justify-content:flex-start;padding:0 12px} button{width:100%} .dropdown{position:static;margin-top:8px} }
    @media (max-width:640px) { header{padding-right:0} .top-actions{position:static;margin-top:12px;width:100%;justify-content:space-between} .contact-btn{flex:1} }
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <div class="top-actions">
        <span class="version-badge">v0.2.0</span>
        <a class="contact-btn" href="https://docs.google.com/forms/d/e/1FAIpQLSfcpjEbCSsfHtbdQ80O_1E81G9XoUNBjvfNviAzJqvgjjjF4A/viewform?usp=publish-editor" target="_blank" rel="noopener noreferrer">문의하기</a>
      </div>
      <h1>림버스 인격 두들</h1>
      <div class="sub">인격명만 검색해서 선택합니다. 정답은 수감자, 인격명, 성급, 키워드 3개를 비교하며, 키워드는 순서와 상관없이 판정합니다.</div>
      <div class="challenge-info" id="challengeInfo">
        <span class="challenge-no" id="challengeNo"></span>
        <span class="countdown" id="countdown"></span>
      </div>
    </header>

    <div class="tab-bar">
      <button class="tab active" id="tabDaily">오늘의 인격</button>
      <button class="tab" id="tabRandom">랜덤 플레이</button>
    </div>

    <section class="panel">
      <div class="already-played" id="alreadyPlayed">오늘은 이미 참여하셨습니다. 내일 다시 오세요! ⏰</div>
      <div class="filter-block">
        <div class="filter-row">
          <div class="filter-title">필터</div>
          <div class="field"><label for="includeSinner">수감자</label><input id="includeSinner" placeholder="예: 료슈" /></div>
          <div class="field"><label for="includeGrade">성급</label><input id="includeGrade" placeholder="예: ★★★ 또는 3" /></div>
          <div class="field"><label for="includeAffil1">소속 1</label><input id="includeAffil1" placeholder="예: 거미집" /></div>
          <div class="field"><label for="includeAffil2">소속 2</label><input id="includeAffil2" placeholder="예: 엄지" /></div>
          <div class="field"><label for="includeK1">키워드 A</label><input id="includeK1" placeholder="예: 출혈 (순서 무관)" /></div>
          <div class="field"><label for="includeK2">키워드 B</label><input id="includeK2" placeholder="예: 호흡 (순서 무관)" /></div>
          <div class="field"><label for="includeK3">키워드 C</label><input id="includeK3" placeholder="예: 파열 (순서 무관)" /></div>
          <div class="mode-box" aria-label="포함 필터 방식">
            <label><input type="radio" name="includeMode" value="and" checked />AND</label>
            <label><input type="radio" name="includeMode" value="or" />OR</label>
          </div>
        </div>
      </div>

      <div class="guess-row">
        <div class="combo">
          <input id="guessInput" autocomplete="off" placeholder="인격명을 입력하거나 클릭해서 선택" aria-label="인격명 검색" />
          <div id="dropdown" class="dropdown" role="listbox"></div>
        </div>
        <button id="guessBtn">확인</button>
        <button id="shareBtn" class="secondary" style="display:none;">결과 복사</button>
        <button id="restartBtn" class="secondary" style="display:none;">재시작</button>
      </div>
      <div class="status">
        <div>남은 기회: <strong id="tries">7</strong></div>
        <div>표시 후보: <strong id="filteredCount">0</strong> / 전체 <strong id="count">0</strong></div>
      </div>
      <div id="message" class="message">정답 인격을 추리해보세요.</div>
      <div class="legend">
        <span class="pill hit">일치</span>
        <span class="pill miss">불일치</span>
        <span class="pill">취소선 테스트: 수감자와 키워드가 모두 빗나간 제출 인격</span>
      </div>
    </section>

    <section class="panel table-wrap">
      <table>
        <thead><tr><th>#</th><th>수감자</th><th>인격명</th><th>성급</th><th>소속1</th><th>소속2</th><th>키워드1</th><th>키워드2</th><th>키워드3</th></tr></thead>
        <tbody id="history"></tbody>
      </table>
    </section>

    <section class="panel table-wrap">
      <div class="record-head">
        <div>
          <h2>플레이 기록</h2>
          <p class="record-note">성공/실패 결과는 이 브라우저의 localStorage에 저장됩니다.</p>
        </div>
        <button id="clearRecordsBtn" class="secondary small-btn">기록 초기화</button>
      </div>
      <table>
        <thead><tr><th>횟수</th><th>날짜</th><th>결과</th><th>시도</th><th>맞춘 항목</th><th>정답</th></tr></thead>
        <tbody id="resultRecords"></tbody>
      </table>
    </section>
  </div>

  <script>
    let DATA = [], SORTED_DATA = [];
    const SINNER_COLOR = {
      '이상':'#d4e1e8','파우스트':'#ffb1b4','돈키호테':'#ffef23','료슈':'#cf0000',
      '뫼르소':'#293b95','홍루':'#5bffde','히스클리프':'#4e3076','이스마엘':'#ff9500',
      '로쟈':'#820000','싱클레어':'#8b9c15','오티스':'#325339','그레고르':'#69350b',
    };
    const KEYWORD_COLOR = {
      '화상':{bg:'#3a0c0c',text:'#ff9090'},'출혈':{bg:'#3a1a08',text:'#ff9955'},
      '진동':{bg:'#2e2200',text:'#ffe066'},'파열':{bg:'#0d2e18',text:'#6ddb8a'},
      '침잠':{bg:'#0a2030',text:'#70c8f0'},'호흡':{bg:'#0c1840',text:'#7090ff'},
      '충전':{bg:'#1e0a30',text:'#c080f0'},
    };
    const GRADE_CLASS = {'★':'grade-1','★★':'grade-2','★★★':'grade-3'};
    const MAX_TRIES = 7;
    const RESULT_STORAGE_KEY = 'limbus_identity_doodle_results_v1';
    const DAILY_PLAYED_KEY = 'daily_played_date';
    const DAILY_RESULT_KEY = 'daily_result';
    const START_DATE = new Date(2025, 0, 15);

    let mode = 'daily';
    let answer = null, triesLeft = MAX_TRIES, finished = false, resultSaved = false, guesses = [];
    let selectedIndex = null, highlightedOption = -1, ignoreSearchForDropdown = false;
    const eliminatedNames = new Set();
    let countdownInterval = null;

    const guessInput = document.getElementById('guessInput');
    const dropdown = document.getElementById('dropdown');
    const guessBtn = document.getElementById('guessBtn');
    const restartBtn = document.getElementById('restartBtn');
    const shareBtn = document.getElementById('shareBtn');
    const triesEl = document.getElementById('tries');
    const countEl = document.getElementById('count');
    const filteredCountEl = document.getElementById('filteredCount');
    const messageEl = document.getElementById('message');
    const historyEl = document.getElementById('history');
    const resultRecordsEl = document.getElementById('resultRecords');
    const clearRecordsBtn = document.getElementById('clearRecordsBtn');
    const alreadyPlayedEl = document.getElementById('alreadyPlayed');
    const challengeInfoEl = document.getElementById('challengeInfo');
    const challengeNoEl = document.getElementById('challengeNo');
    const countdownEl = document.getElementById('countdown');
    const tabDaily = document.getElementById('tabDaily');
    const tabRandom = document.getElementById('tabRandom');
    const includeInputs = [
      document.getElementById('includeSinner'), document.getElementById('includeGrade'),
      document.getElementById('includeAffil1'), document.getElementById('includeAffil2'),
      document.getElementById('includeK1'), document.getElementById('includeK2'), document.getElementById('includeK3')
    ];
    const excludeInputs = [];
    const allFilterInputs = [...includeInputs];

    // ── 날짜 / 시드 ──────────────────────────────────────────
    function getDailyDateKey() {
      const d = new Date();
      return String(d.getFullYear() * 10000 + (d.getMonth() + 1) * 100 + d.getDate());
    }
    function getDailyChallengeNo() {
      const today = new Date(); today.setHours(0,0,0,0);
      const start = new Date(START_DATE); start.setHours(0,0,0,0);
      return Math.max(1, Math.floor((today - start) / 86400000) + 1);
    }
    function getDailyAnswer(data) {
      const d = new Date();
      const seed = d.getFullYear() * 10000 + (d.getMonth() + 1) * 100 + d.getDate();
      const hash = (seed * 2654435761) >>> 0;
      return data[hash % data.length];
    }

    // ── 일일 챌린지 저장/복원 ─────────────────────────────────
    function saveDailyResult(won) {
      const fields = ['수감자','인격명','성급','소속1','소속2','키워드1','키워드2','키워드3'];
      localStorage.setItem(DAILY_PLAYED_KEY, getDailyDateKey());
      localStorage.setItem(DAILY_RESULT_KEY, JSON.stringify({
        won, attempts: guesses.length, challengeNo: getDailyChallengeNo(),
        answerName: answer['인격명'],
        guesses: guesses.map(g => ({ row: g, hits: fields.map(f => judgeCell(f, g, answer).cls === 'hit') }))
      }));
    }
    function loadDailyResult() {
      try {
        if (localStorage.getItem(DAILY_PLAYED_KEY) !== getDailyDateKey()) return null;
        const raw = localStorage.getItem(DAILY_RESULT_KEY);
        return raw ? JSON.parse(raw) : null;
      } catch(e) { return null; }
    }

    // ── 카운트다운 ────────────────────────────────────────────
    function startCountdown() {
      if (countdownInterval) clearInterval(countdownInterval);
      function tick() {
        const now = new Date();
        const midnight = new Date(now); midnight.setHours(24,0,0,0);
        const diff = midnight - now;
        if (diff <= 0) { clearInterval(countdownInterval); location.reload(); return; }
        const h = String(Math.floor(diff / 3600000)).padStart(2,'0');
        const m = String(Math.floor((diff % 3600000) / 60000)).padStart(2,'0');
        const s = String(Math.floor((diff % 60000) / 1000)).padStart(2,'0');
        countdownEl.textContent = `· 다음 인격까지 ${h}:${m}:${s}`;
      }
      tick();
      countdownInterval = setInterval(tick, 1000);
    }

    // ── 결과 공유 ─────────────────────────────────────────────
    function buildShareText() {
      const fields = ['수감자','인격명','성급','소속1','소속2','키워드1','키워드2','키워드3'];
      const won = finished && guesses.length > 0 && guesses[guesses.length-1]['인격명'] === answer['인격명'];
      const lines = [`림버스 인격 두들 #${getDailyChallengeNo()}`, `${won ? guesses.length : 'X'}/${MAX_TRIES}`, ''];
      fields.forEach(field => {
        const row = guesses.map(g => judgeCell(field, g, answer).cls === 'hit' ? '✅' : '❌').join('');
        lines.push(`${field} ${row}`);
      });
      return lines.join('\n');
    }
    function copyShareText() {
      const text = buildShareText();
      const orig = shareBtn.textContent;
      navigator.clipboard.writeText(text).then(() => {
        shareBtn.textContent = '복사됨! ✓';
        setTimeout(() => { shareBtn.textContent = orig; }, 1500);
      }).catch(() => { prompt('아래 텍스트를 복사하세요:', text); });
    }

    // ── 유틸 / 필터 ─────────────────────────────────────────
    function normalize(v) { return (v ?? '').toString().trim(); }
    function lower(v) { return normalize(v).toLowerCase(); }
    function normalizeSinnerInput(value) {
      const v = normalize(value);
      return ({ '로슈': '료슈' })[v] || v;
    }
    function keywordsOf(row) { return [row['키워드1'], row['키워드2'], row['키워드3']].map(normalize).filter(Boolean); }
    function pickAnswer() { return DATA[Math.floor(Math.random() * DATA.length)]; }
    function escapeHtml(str) { return String(str).replace(/[&<>'"]/g, ch => ({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[ch])); }
    function filterMode(name) { return document.querySelector(`input[name="${name}"]:checked`).value; }

    function normalizeGradeInput(value) {
      const v = normalize(value).replace(/\s/g, '');
      if (!v) return '';
      if (['1','1성','★'].includes(v)) return '★';
      if (['2','2성','★★'].includes(v)) return '★★';
      if (['3','3성','★★★'].includes(v)) return '★★★';
      return v;
    }

    function rowMatchesFilterSet(row, inputs, modeName) {
      const sinner = lower(normalizeSinnerInput(inputs[0].value));
      const grade = normalizeGradeInput(inputs[1].value);
      const affil1 = lower(inputs[2]?.value || '');
      const affil2 = lower(inputs[3]?.value || '');
      const filterKeywords = inputs.slice(4).map(i => lower(i.value)).filter(Boolean);
      const checks = [];
      if (sinner) checks.push(lower(row['수감자']).includes(sinner));
      if (grade) checks.push(row['성급'] === grade);
      if (affil1) checks.push(lower(row['소속1'] || '').includes(affil1));
      if (affil2) checks.push(lower(row['소속2'] || '').includes(affil2));
      if (filterKeywords.length) {
        const rowKeywords = keywordsOf(row).map(k => k.toLowerCase());
        filterKeywords.forEach(k => checks.push(rowKeywords.some(rk => rk.includes(k))));
      }
      if (!checks.length) return true;
      return filterMode(modeName) === 'and' ? checks.every(Boolean) : checks.some(Boolean);
    }

    function rowMatchesFilters(row) { return rowMatchesFilterSet(row, includeInputs, 'includeMode'); }

    function isExactSelectedName() {
      const v = guessInput.value.trim();
      return !!v && DATA.some(row => row['인격명'] === v);
    }
    function filteredRows(ignoreSearch = ignoreSearchForDropdown) {
      const q = ignoreSearch ? '' : lower(guessInput.value);
      return SORTED_DATA.filter(row => rowMatchesFilters(row) && (!q || lower(row['인격명']).includes(q)));
    }
    function renderDropdown(open = true, ignoreSearch = ignoreSearchForDropdown) {
      const rows = filteredRows(ignoreSearch);
      filteredCountEl.textContent = rows.length;
      highlightedOption = Math.min(highlightedOption, rows.length - 1);
      dropdown.innerHTML = rows.length ? rows.map((row, i) => `
        <div class="option ${eliminatedNames.has(row['인격명']) ? 'eliminated' : ''} ${i === highlightedOption ? 'active' : ''}" data-idx="${row.__idx}" role="option">
          <span class="option-name">${escapeHtml(row['인격명'])}</span>
          <span class="option-meta">${sinnerDot(row['수감자'])} · ${gradeSpan(row['성급'])} · ${keywordsOf(row).map(k => kwChip(k)).join(' ') || '키워드 없음'}</span>
        </div>
      `).join('') : '<div class="option"><span class="option-name">검색 결과가 없습니다</span></div>';
      dropdown.classList.toggle('open', open && !finished);
    }
    function selectRow(idx) {
      const row = DATA[Number(idx)];
      if (!row) return;
      selectedIndex = Number(idx);
      guessInput.value = row['인격명'];
      ignoreSearchForDropdown = false;
      dropdown.classList.remove('open');
    }

    function keywordHitAtPosition(field, guess, ans) {
      const gv = normalize(guess[field]);
      const ansKeywords = keywordsOf(ans);
      if (!gv && !ansKeywords[Number(field.replace('키워드','')) - 1]) return true;
      return !!gv && ansKeywords.includes(gv);
    }
    function judgeCell(field, guess, ans) {
      const hit = field.startsWith('키워드') ? keywordHitAtPosition(field, guess, ans) : normalize(guess[field]) === normalize(ans[field]);
      return { cls: hit ? 'hit' : 'miss', label: hit ? '일치' : '불일치' };
    }

    function sinnerDot(sinner) {
      const color = SINNER_COLOR[sinner];
      if (!color) return escapeHtml(sinner);
      return `<span style="display:inline-flex;align-items:center;gap:0"><span class="sinner-dot" style="background:${color}"></span>${escapeHtml(sinner)}</span>`;
    }
    function kwChip(kw) {
      if (!kw) return '<span class="empty">-</span>';
      const c = KEYWORD_COLOR[kw];
      return c ? `<span class="kw-chip" style="background:${c.bg};color:${c.text}">${escapeHtml(kw)}</span>` : escapeHtml(kw);
    }
    function gradeSpan(grade) {
      return `<span class="${GRADE_CLASS[grade] || ''}">${escapeHtml(grade)}</span>`;
    }
    function renderCell(field, guess, ans) {
      const j = judgeCell(field, guess, ans);
      const raw = normalize(guess[field]);
      let display;
      if (field.startsWith('키워드')) display = kwChip(raw);
      else if (field === '성급') display = gradeSpan(raw || '-');
      else if (field === '수감자') display = raw ? sinnerDot(raw) : '<span class="empty">-</span>';
      else display = raw ? escapeHtml(raw) : '<span class="empty">-</span>';
      return `<td class="${j.cls}"><span class="cell"><span class="value">${display}</span><span class="judge">${j.label}</span></span></td>`;
    }
    function renderHistory(animate = true) {
      historyEl.innerHTML = guesses.map((g, i) => `
        <tr class="${animate && i === guesses.length - 1 ? 'reveal-row' : ''}"><td>${i + 1}</td>${renderCell('수감자', g, answer)}${renderCell('인격명', g, answer)}${renderCell('성급', g, answer)}${renderCell('소속1', g, answer)}${renderCell('소속2', g, answer)}${renderCell('키워드1', g, answer)}${renderCell('키워드2', g, answer)}${renderCell('키워드3', g, answer)}</tr>
      `).join('');
    }
    function shouldStrikeCandidate(guess, ans) {
      const sinnerMiss = normalize(guess['수감자']) !== normalize(ans['수감자']);
      const guessKeywords = keywordsOf(guess);
      const ansKeywords = keywordsOf(ans);
      return sinnerMiss && (guessKeywords.length === 0 || !guessKeywords.some(k => ansKeywords.includes(k)));
    }

    function todayKey() {
      const d = new Date();
      return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    }
    function loadResultRecords() {
      try { const r = localStorage.getItem(RESULT_STORAGE_KEY); const p = r ? JSON.parse(r) : []; return Array.isArray(p) ? p : []; }
      catch(e) { return []; }
    }
    function saveResultRecords(records) { localStorage.setItem(RESULT_STORAGE_KEY, JSON.stringify(records)); }

    function matchedCount(guess, ans) {
      return ['수감자','인격명','성급','소속1','소속2','키워드1','키워드2','키워드3']
        .filter(f => judgeCell(f, guess, ans).cls === 'hit').length;
    }
    function bestMatchedCount() { return guesses.length ? Math.max(...guesses.map(g => matchedCount(g, answer))) : 0; }

    function renderResultRecords() {
      const records = loadResultRecords();
      const total = records.length;
      resultRecordsEl.innerHTML = total ? [...records].reverse().map((r, i) => `
        <tr>
          <td>${total - i}회</td>
          <td>${escapeHtml(r.date || '-')}</td>
          <td class="${r.won ? 'record-success' : 'record-fail'}">${r.won ? '성공' : '실패'}</td>
          <td>${escapeHtml(r.attempts ?? '-')}/${MAX_TRIES}회</td>
          <td>${r.won ? '정답' : `${escapeHtml(r.matched ?? 0)}개 맞춤`}</td>
          <td>${escapeHtml(r.answerName || '-')}</td>
        </tr>
      `).join('') : '<tr><td colspan="6" class="empty">아직 저장된 플레이 기록이 없습니다.</td></tr>';
    }
    function saveGameResult(won) {
      if (resultSaved) return;
      resultSaved = true;
      const records = loadResultRecords();
      records.push({ date: todayKey(), won, attempts: guesses.length, matched: won ? 6 : bestMatchedCount(), answerName: answer['인격명'], savedAt: new Date().toISOString() });
      saveResultRecords(records);
      renderResultRecords();
    }

    function buildEndMessage(won) {
      const affilParts = [answer['소속1'], answer['소속2']].filter(Boolean).join(' · ');
      const answerText = `${answer['인격명']} / ${answer['수감자']} / ${answer['성급']}${affilParts ? ' / ' + affilParts : ''} / ${keywordsOf(answer).join(', ') || '키워드 없음'}`;
      const imgHtml = answer['slug'] ? `<div class="answer-img-wrap"><img src="https://assets.limbusdeck.com/identities/full/${escapeHtml(answer['slug'])}.webp" alt="${escapeHtml(answer['인격명'])}"></div>` : '';
      return (won ? `정답입니다! <span class="answer">${escapeHtml(answerText)}</span>` : `기회를 모두 사용했습니다. 정답은 <span class="answer">${escapeHtml(answerText)}</span> 입니다.`) + imgHtml;
    }

    function showEnd(won) {
      finished = true;
      guessInput.disabled = true;
      guessBtn.disabled = true;
      dropdown.classList.remove('open');
      saveGameResult(won);
      messageEl.innerHTML = buildEndMessage(won);
      if (mode === 'daily') {
        saveDailyResult(won);
        shareBtn.style.display = 'inline-block';
      } else {
        restartBtn.style.display = 'inline-block';
      }
    }

    function resolveSelectedGuess() {
      if (selectedIndex !== null && DATA[selectedIndex] && DATA[selectedIndex]['인격명'] === guessInput.value.trim()) return DATA[selectedIndex];
      const exact = DATA.find(row => row['인격명'] === guessInput.value.trim());
      if (exact) { selectedIndex = DATA.indexOf(exact); return exact; }
      return null;
    }
    function makeGuess() {
      if (finished) return;
      const guess = resolveSelectedGuess();
      if (!guess) { messageEl.textContent = '드롭박스에서 인격명을 선택하세요.'; return; }
      if (guesses.some(g => g['인격명'] === guess['인격명'])) { messageEl.textContent = '이미 선택한 인격입니다.'; return; }
      guesses.push(guess);
      triesLeft -= 1;
      triesEl.textContent = triesLeft;
      if (shouldStrikeCandidate(guess, answer)) eliminatedNames.add(guess['인격명']);
      renderHistory();
      const won = guess['인격명'] === answer['인격명'];
      if (won) return showEnd(true);
      if (triesLeft <= 0) return showEnd(false);
      messageEl.textContent = `오답입니다. 남은 기회는 ${triesLeft}번입니다.`;
      guessInput.value = '';
      selectedIndex = null;
      ignoreSearchForDropdown = false;
      renderDropdown(false);
    }

    function resetGameState() {
      triesLeft = MAX_TRIES; finished = false; resultSaved = false; guesses = [];
      selectedIndex = null; highlightedOption = -1; ignoreSearchForDropdown = false;
      eliminatedNames.clear();
      guessInput.disabled = false; guessBtn.disabled = false;
      restartBtn.style.display = 'none'; shareBtn.style.display = 'none';
      alreadyPlayedEl.style.display = 'none';
      triesEl.textContent = MAX_TRIES;
      messageEl.textContent = '정답 인격을 추리해보세요.';
      historyEl.innerHTML = ''; guessInput.value = '';
    }
    function resetFilters() {
      allFilterInputs.forEach(i => { i.value = ''; });
      const and = document.querySelector('input[name="includeMode"][value="and"]');
      if (and) and.checked = true;
    }

    // ── 모드 초기화 ──────────────────────────────────────────
    function initRandomMode() {
      if (countdownInterval) { clearInterval(countdownInterval); countdownInterval = null; }
      challengeInfoEl.style.display = 'none';
      resetGameState();
      resetFilters();
      answer = pickAnswer();
      renderDropdown(false);
      console.log('정답:', answer);
    }

    function initDailyMode() {
      challengeInfoEl.style.display = '';
      challengeNoEl.textContent = `오늘의 인격 #${getDailyChallengeNo()}`;
      answer = getDailyAnswer(DATA);
      console.log('정답:', answer);

      const saved = loadDailyResult();
      if (saved) {
        resetGameState();
        resetFilters();
        finished = true; resultSaved = true;
        guessInput.disabled = true; guessBtn.disabled = true;
        alreadyPlayedEl.style.display = '';
        guesses = (saved.guesses || []).map(g => g.row).filter(Boolean);
        if (guesses.length) {
          renderHistory(false);
          triesLeft = Math.max(0, MAX_TRIES - guesses.length);
          triesEl.textContent = triesLeft;
          messageEl.innerHTML = buildEndMessage(saved.won);
          shareBtn.style.display = 'inline-block';
        }
        startCountdown();
      } else {
        resetGameState();
        resetFilters();
        renderDropdown(false);
        startCountdown();
      }
    }

    function switchMode(newMode) {
      if (newMode === mode && DATA.length) return;
      mode = newMode;
      tabDaily.classList.toggle('active', mode === 'daily');
      tabRandom.classList.toggle('active', mode === 'random');
      if (mode === 'daily') initDailyMode();
      else initRandomMode();
    }

    // ── 탭 / 버튼 이벤트 ─────────────────────────────────────
    tabDaily.addEventListener('click', () => switchMode('daily'));
    tabRandom.addEventListener('click', () => switchMode('random'));
    shareBtn.addEventListener('click', copyShareText);
    restartBtn.addEventListener('click', initRandomMode);
    guessBtn.addEventListener('click', makeGuess);
    clearRecordsBtn.addEventListener('click', () => {
      if (!confirm('저장된 플레이 기록을 모두 삭제할까요?')) return;
      localStorage.removeItem(RESULT_STORAGE_KEY);
      renderResultRecords();
    });

    dropdown.addEventListener('mousedown', e => {
      const opt = e.target.closest('.option[data-idx]');
      if (opt) selectRow(opt.dataset.idx);
    });
    guessInput.addEventListener('input', () => {
      selectedIndex = null; highlightedOption = -1; ignoreSearchForDropdown = false;
      renderDropdown(true);
    });
    function openDropdownFromSelectedValue() {
      ignoreSearchForDropdown = isExactSelectedName();
      highlightedOption = -1;
      renderDropdown(true, ignoreSearchForDropdown);
    }
    guessInput.addEventListener('focus', openDropdownFromSelectedValue);
    guessInput.addEventListener('click', openDropdownFromSelectedValue);
    guessInput.addEventListener('keydown', e => {
      const rows = filteredRows(ignoreSearchForDropdown);
      if (e.key === 'ArrowDown') { e.preventDefault(); highlightedOption = Math.min(rows.length-1, highlightedOption+1); renderDropdown(true); dropdown.querySelector('.option.active')?.scrollIntoView({block:'nearest'}); }
      else if (e.key === 'ArrowUp') { e.preventDefault(); highlightedOption = Math.max(0, highlightedOption-1); renderDropdown(true); dropdown.querySelector('.option.active')?.scrollIntoView({block:'nearest'}); }
      else if (e.key === 'Enter') {
        e.preventDefault();
        if (dropdown.classList.contains('open') && highlightedOption >= 0 && rows[highlightedOption]) selectRow(rows[highlightedOption].__idx);
        else makeGuess();
      }
      else if (e.key === 'Escape') { ignoreSearchForDropdown = false; dropdown.classList.remove('open'); }
    });
    document.addEventListener('click', e => {
      if (!e.target.closest('.combo')) { ignoreSearchForDropdown = false; dropdown.classList.remove('open'); }
      if (!e.target.closest('.field')) closeFilterDropdown();
    });
    allFilterInputs.forEach(i => i.addEventListener('input', () => renderDropdown(document.activeElement === guessInput)));
    document.querySelectorAll('input[name="includeMode"]').forEach(r => r.addEventListener('change', () => renderDropdown(document.activeElement === guessInput)));

    // ── 필터 드롭다운 ─────────────────────────────────────────
    const filterDropdown = document.createElement('div');
    filterDropdown.className = 'dropdown';
    filterDropdown.style.cssText = 'position:fixed;z-index:200;max-height:240px;';
    document.body.appendChild(filterDropdown);
    let activeFilterInput = null, filterHighlight = -1;

    function getFilterValues(input) {
      if (!DATA.length) return [];
      const q = input.value.toLowerCase().trim();
      let vals = [];
      if (input.id === 'includeSinner') vals = [...new Set(DATA.map(r => r['수감자']))].sort((a,b) => a.localeCompare(b,'ko-KR'));
      else if (input.id === 'includeGrade') vals = ['★','★★','★★★'];
      else if (input.id === 'includeAffil1') vals = [...new Set(DATA.map(r => r['소속1']).filter(Boolean))].sort((a,b) => a.localeCompare(b,'ko-KR'));
      else if (input.id === 'includeAffil2') vals = [...new Set(DATA.map(r => r['소속2']).filter(Boolean))].sort((a,b) => a.localeCompare(b,'ko-KR'));
      else if (['includeK1','includeK2','includeK3'].includes(input.id)) vals = [...new Set(DATA.flatMap(r => [r['키워드1'],r['키워드2'],r['키워드3']]).filter(Boolean))].sort((a,b) => a.localeCompare(b,'ko-KR'));
      return q ? vals.filter(v => v.toLowerCase().includes(q)) : vals;
    }
    function positionFilterDropdown() {
      if (!activeFilterInput) return;
      const r = activeFilterInput.getBoundingClientRect();
      filterDropdown.style.top = (r.bottom+4)+'px';
      filterDropdown.style.left = r.left+'px';
      filterDropdown.style.width = r.width+'px';
    }
    function renderFilterDropdown() {
      if (!activeFilterInput) { filterDropdown.classList.remove('open'); return; }
      const vals = getFilterValues(activeFilterInput);
      filterHighlight = Math.min(filterHighlight, vals.length-1);
      filterDropdown.innerHTML = vals.length
        ? vals.map((v,i) => `<div class="option ${i===filterHighlight?'active':''}" data-val="${escapeHtml(v)}">${escapeHtml(v)}</div>`).join('')
        : '<div class="option"><span class="option-name">결과 없음</span></div>';
      positionFilterDropdown();
      filterDropdown.classList.add('open');
    }
    function closeFilterDropdown() { filterDropdown.classList.remove('open'); activeFilterInput = null; filterHighlight = -1; }

    filterDropdown.addEventListener('mousedown', e => {
      e.preventDefault();
      const opt = e.target.closest('.option[data-val]');
      if (!opt || !activeFilterInput) return;
      activeFilterInput.value = opt.dataset.val;
      activeFilterInput.dispatchEvent(new Event('input', { bubbles: true }));
      closeFilterDropdown();
    });
    includeInputs.forEach(input => {
      input.addEventListener('focus', () => { activeFilterInput = input; filterHighlight = -1; renderFilterDropdown(); });
      input.addEventListener('click', () => { activeFilterInput = input; filterHighlight = -1; renderFilterDropdown(); });
      input.addEventListener('input', () => { filterHighlight = -1; if (activeFilterInput === input) renderFilterDropdown(); });
      input.addEventListener('keydown', e => {
        const vals = getFilterValues(input);
        if (e.key === 'ArrowDown') { e.preventDefault(); filterHighlight = Math.min(vals.length-1, filterHighlight+1); renderFilterDropdown(); filterDropdown.querySelector('.option.active')?.scrollIntoView({block:'nearest'}); }
        else if (e.key === 'ArrowUp') { e.preventDefault(); filterHighlight = Math.max(0, filterHighlight-1); renderFilterDropdown(); filterDropdown.querySelector('.option.active')?.scrollIntoView({block:'nearest'}); }
        else if (e.key === 'Enter' && filterHighlight >= 0 && vals[filterHighlight]) { e.preventDefault(); input.value = vals[filterHighlight]; input.dispatchEvent(new Event('input',{bubbles:true})); closeFilterDropdown(); }
        else if (e.key === 'Escape') closeFilterDropdown();
      });
      input.addEventListener('blur', () => setTimeout(closeFilterDropdown, 150));
    });
    window.addEventListener('scroll', positionFilterDropdown, { passive: true });
    window.addEventListener('resize', positionFilterDropdown, { passive: true });

    // ── 데이터 로드 ──────────────────────────────────────────
    renderResultRecords();
    messageEl.textContent = '데이터를 불러오는 중입니다...';
    guessBtn.disabled = true;
    guessInput.disabled = true;
    fetch('./data.json')
      .then(r => { if (!r.ok) throw new Error(`HTTP ${r.status}`); return r.json(); })
      .then(json => {
        DATA = json;
        SORTED_DATA = DATA.map((row, idx) => ({...row, __idx: idx})).sort((a, b) => a['인격명'].localeCompare(b['인격명'], 'ko-KR'));
        countEl.textContent = DATA.length;
        initDailyMode();
      })
      .catch(err => {
        console.error('데이터 로드 실패:', err);
        messageEl.textContent = '데이터를 불러오지 못했습니다. 페이지를 새로고침해 주세요.';
      });
  </script>
</body>
</html>
